<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON STRIKE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a12;font-family:'Rajdhani',sans-serif;cursor:default}
canvas{display:block}
#startScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1a0808 0%,#0a0a12 70%);z-index:100}
#startScreen h1{font-family:'Orbitron',monospace;font-size:clamp(2.5rem,8vw,5.5rem);font-weight:900;color:#ff2d2d;text-shadow:0 0 40px rgba(255,45,45,.5),0 0 80px rgba(255,45,45,.15);letter-spacing:.12em;margin-bottom:.3rem}
.subtitle{font-size:clamp(.8rem,2vw,1.1rem);color:#00e5ff;letter-spacing:.35em;text-transform:uppercase;margin-bottom:3rem;opacity:.7}
.start-btn{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;padding:1rem 3.5rem;background:transparent;color:#ff2d2d;border:2px solid #ff2d2d;cursor:pointer;letter-spacing:.18em;transition:all .3s;text-transform:uppercase}
.start-btn:hover{background:#ff2d2d;color:#0a0a12;box-shadow:0 0 40px rgba(255,45,45,.4)}
.controls-info{margin-top:2.5rem;color:#444;font-size:.85rem;text-align:center;line-height:2}
.controls-info span{color:#777;font-weight:700}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.7)}
#crosshair::before{top:0;left:50%;width:1.5px;height:100%;transform:translateX(-50%)}
#crosshair::after{left:0;top:50%;height:1.5px;width:100%;transform:translateY(-50%)}
.ch-dot{position:absolute;top:50%;left:50%;width:3px;height:3px;background:#ff2d2d;border-radius:50%;transform:translate(-50%,-50%)}
#hitMarker{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;opacity:0;transition:opacity .08s;pointer-events:none}
#hitMarker::before,#hitMarker::after{content:'';position:absolute;top:50%;left:50%;width:14px;height:2px;background:#ff2d2d;transform-origin:center}
#hitMarker::before{transform:translate(-50%,-50%) rotate(45deg)}
#hitMarker::after{transform:translate(-50%,-50%) rotate(-45deg)}
#hitMarker.show{opacity:1}
#healthBar{position:absolute;bottom:36px;left:36px;display:flex;align-items:center;gap:10px}
.bar-bg{width:180px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#ff2d2d,#ff6b4a);border-radius:3px;transition:width .25s;width:100%}
.hp-val{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:#ff2d2d;min-width:50px}
#ammoDisplay{position:absolute;bottom:36px;right:36px;text-align:right}
.ammo-cur{font-family:'Orbitron',monospace;font-size:2.6rem;font-weight:900;color:#fff;line-height:1}
.ammo-res{font-family:'Rajdhani',sans-serif;font-size:1.1rem;color:#555}
.weapon-label{font-size:.7rem;color:#00e5ff;letter-spacing:.22em;text-transform:uppercase;margin-bottom:2px}
#scoreDisplay{position:absolute;top:26px;right:36px;text-align:right}
.score-val{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:700;color:#fff}
.wave-val{font-size:.8rem;color:#00e5ff;letter-spacing:.18em}
#minimap{position:absolute;top:26px;left:26px;width:140px;height:140px;background:rgba(0,0,0,.45);border:1px solid rgba(0,229,255,.25);border-radius:4px;overflow:hidden}
#minimapCanvas{width:100%;height:100%}
#damageOverlay{position:absolute;inset:0;box-shadow:inset 0 0 80px rgba(255,0,0,0);pointer-events:none;transition:box-shadow .15s}
#damageOverlay.show{box-shadow:inset 0 0 100px rgba(255,0,0,.35)}
#reloadBar{position:absolute;top:56%;left:50%;transform:translate(-50%,-50%);width:120px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;opacity:0;transition:opacity .2s;overflow:hidden}
#reloadBar.show{opacity:1}
#reloadFill{height:100%;background:#00e5ff;border-radius:2px;width:0%;transition:width .05s linear}
#waveAnnounce{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity .5s;pointer-events:none}
#waveAnnounce.show{opacity:1}
#waveAnnounce h2{font-family:'Orbitron',monospace;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#ff2d2d;text-shadow:0 0 30px rgba(255,45,45,.5)}
#waveAnnounce p{color:#00e5ff;font-size:.95rem;letter-spacing:.22em;margin-top:.3rem}
#killFeed{position:absolute;top:26px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px}
.kill-msg{font-size:.82rem;letter-spacing:.12em;animation:kfade 2.2s forwards}
.kill-msg.kill-normal{color:#ff6b4a}
.kill-msg.kill-heavy{color:#ff00aa}
.kill-msg.kill-rusher{color:#ffdd00}
.kill-msg.kill-boss{color:#ff2d2d;font-size:1rem;font-weight:700}
.kill-msg.pickup{color:#00e5ff}
.kill-msg.pickup-health{color:#00ff88}
@keyframes kfade{0%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
#pauseMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:1.2rem;color:#00e5ff;letter-spacing:.2em;opacity:0;transition:opacity .3s;pointer-events:none}
#pauseMsg.show{opacity:.8}
#gameOver{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,.96);z-index:100}
#gameOver h2{font-family:'Orbitron',monospace;font-size:clamp(2.5rem,6vw,4rem);font-weight:900;color:#ff2d2d;margin-bottom:1.2rem;text-shadow:0 0 30px rgba(255,45,45,.4)}
.go-stats{color:#777;font-size:1.15rem;margin-bottom:2rem;text-align:center;line-height:2.2}
.go-stats span{color:#fff;font-weight:700}
#comboDisplay{position:absolute;top:16%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity .25s;pointer-events:none}
#comboDisplay.show{opacity:1}
.combo-val{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;color:#ffaa00;text-shadow:0 0 25px rgba(255,170,0,.6)}
.combo-label{font-size:.65rem;color:#ffaa00;letter-spacing:.25em}
#buffDisplay{position:absolute;bottom:80px;left:36px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.buff-item{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.15em;padding:2px 8px;border-radius:2px;animation:buffPulse 1s infinite alternate}
@keyframes buffPulse{0%{opacity:.7}100%{opacity:1}}
.buff-damage{color:#ff4444;background:rgba(255,68,68,.15);border:1px solid rgba(255,68,68,.3)}
.buff-shield{color:#00e5ff;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3)}
#dashBar{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:60px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
#dashFill{height:100%;background:#00e5ff;border-radius:2px;width:100%;transition:width .1s linear}
.dash-label{position:absolute;bottom:57px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:.5rem;color:#00e5ff;letter-spacing:.2em;opacity:.5}
#weaponSlots{position:absolute;bottom:80px;right:36px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:none}
.weapon-slot{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.1em;padding:3px 10px;border:1px solid rgba(255,255,255,.08);color:#444;border-radius:2px;transition:all .15s}
.weapon-slot.active{color:#fff;border-color:#ff2d2d;background:rgba(255,45,45,.12)}
#bossHP{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:10px;flex-direction:column;pointer-events:none}
.boss-name{font-family:'Orbitron',monospace;font-size:.65rem;color:#ff2d2d;letter-spacing:.25em}
.boss-bar-bg{width:240px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.boss-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d2d,#ff6b4a);border-radius:3px;transition:width .2s}
#zoneFlash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .1s;box-shadow:inset 0 0 60px rgba(255,100,0,.2)}
#zoneFlash.show{opacity:1}
</style>
</head>
<body>

<div id="startScreen">
  <h1>NEON STRIKE</h1>
  <div class="subtitle">Wave Survival FPS</div>
  <button class="start-btn" id="startBtn">ENGAGE</button>
  <div class="controls-info">
    <span>WASD</span> Move &bull; <span>MOUSE</span> Aim &bull; <span>CLICK</span> Fire<br>
    <span>1/2</span> Switch Weapon &bull; <span>R</span> Reload &bull; <span>SPACE</span> Dash<br>
    <span>SHIFT</span> Sprint &bull; <span>ESC</span> Pause
  </div>
</div>

<div id="hud">
  <div id="crosshair"><div class="ch-dot"></div></div>
  <div id="hitMarker"></div>
  <div id="healthBar">
    <div class="bar-bg"><div class="bar-fill" id="hpFill"></div></div>
    <div class="hp-val" id="hpVal">100</div>
  </div>
  <div id="ammoDisplay">
    <div class="weapon-label" id="weaponLabel">Pulse Rifle</div>
    <div class="ammo-cur" id="ammoCur">30</div>
    <div class="ammo-res" id="ammoRes">/ 120</div>
  </div>
  <div id="scoreDisplay">
    <div class="score-val" id="scoreVal">0</div>
    <div class="wave-val" id="waveVal">WAVE 1</div>
  </div>
  <div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
  <div id="damageOverlay"></div>
  <div id="zoneFlash"></div>
  <div id="reloadBar"><div id="reloadFill"></div></div>
  <div id="waveAnnounce"><h2 id="waveText"></h2><p id="waveSubtext"></p></div>
  <div id="killFeed"></div>
  <div id="pauseMsg">PAUSED — CLICK TO RESUME</div>
  <div id="comboDisplay"><div class="combo-val" id="comboVal">x2</div><div class="combo-label">COMBO</div></div>
  <div id="buffDisplay"></div>
  <div id="dashBar"><div id="dashFill"></div></div>
  <div class="dash-label">DASH</div>
  <div id="weaponSlots">
    <div class="weapon-slot active" id="slot1">[1] PULSE RIFLE</div>
    <div class="weapon-slot" id="slot2">[2] SCATTER CANNON</div>
  </div>
  <div id="bossHP"><div class="boss-name">OVERLORD</div><div class="boss-bar-bg"><div class="boss-bar-fill" id="bossHPFill"></div></div></div>
</div>

<div id="gameOver">
  <h2>TERMINATED</h2>
  <div class="go-stats" id="goStats"></div>
  <button class="start-btn" id="restartBtn">RESTART</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ===== CONSTANTS ===== */
const ARENA=56, WALL_H=4, PLAYER_H=1.6, PLAYER_R=0.4;
const MOVE_SPEED=7.5, SPRINT_MULT=1.65;
const INVULN_TIME=0.35;
const DASH_SPEED=28, DASH_DUR=0.18, DASH_CD=3.5;

/* Weapon configs */
const WCONFIG=[
  {name:'Pulse Rifle',mag:30,rate:110,reload:1600,dmg:25,reserve:120},
  {name:'Scatter Cannon',mag:8,rate:550,reload:2000,dmg:14,pellets:8,spread:.09,reserve:48,range:22},
];

/* Enemy base stats */
const EB={
  regular:{hp:30,speed:3.8,dmg:8,atkRate:1.0,atkRange:3.0,radius:.5},
  heavy:{hp:70,speed:2.2,dmg:18,atkRate:1.4,atkRange:3.0,radius:.55},
  rusher:{hp:15,speed:7.0,dmg:5,atkRate:.55,atkRange:2.2,radius:.35},
  boss:{hp:400,speed:1.8,dmg:30,atkRate:1.8,atkRange:4.5,radius:1.2},
};

/* Scaling per wave after wave 3 */
const SCALE_START=3, HP_SCALE=.12, SPD_SCALE=.04;

function getMaxEnemies(w){return Math.min(35,10+Math.floor(w*2.2))}
function scaledHP(base,w){return Math.round(base*(1+Math.max(0,w-SCALE_START)*HP_SCALE))}
function scaledSpd(base,w){return base*(1+Math.max(0,w-SCALE_START)*SPD_SCALE)}

const COMBO_WINDOW=2.2;

/* ===== STATE ===== */
let gameState='menu';
let scene,camera,renderer,clock;
let playerBody,playerHead;
let weaponGroups=[],weaponGroup; // index 0=rifle, 1=shotgun
let weaponBasePos=new THREE.Vector3(.28,-.22,-.48);
let weaponRecoil=0,weaponBob=0,weaponSwayX=0,weaponSwayY=0;
let wState=[
  {ammo:30,reserve:120,canShoot:true,isReloading:false,reloadStart:0},
  {ammo:8,reserve:48,canShoot:true,isReloading:false,reloadStart:0},
];
let currentWeaponIdx=0;
let mouseDown=false;
let moveF=false,moveB=false,moveL=false,moveR=false,sprint=false;
let playerHealth=100,shieldHP=0,invulnTimer=0,screenShake=0;
let score=0,wave=0,totalKills=0;
let enemies=[],wallBoxes=[],pickups=[],particleSystems=[],damageZones=[];
let wavePending=false,waveTimer=0;
let comboCount=0,comboTimer=0,bestCombo=0;
let damageBuffTimer=0;
let dashCooldown=0,isDashing=false,dashTimer=0,dashDir=new THREE.Vector3();
let bossRef=null; // reference to active boss for HP bar
let mmCtx,hitMarkerTimer=0,damageFlashTimer=0,audioCtx;

/* ===== PRE-CREATED MATERIALS ===== */
const flashMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:5});

const regBodyMat=new THREE.MeshStandardMaterial({color:0x00ff66,emissive:0x00ff66,emissiveIntensity:1.8,metalness:.3,roughness:.5});
const regAccentMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:4});
const regJointMat=new THREE.MeshStandardMaterial({color:0x004422,emissive:0x00ff66,emissiveIntensity:.3,metalness:.4,roughness:.6});

const hvyBodyMat=new THREE.MeshStandardMaterial({color:0xff00aa,emissive:0xff00aa,emissiveIntensity:1.8,metalness:.3,roughness:.5});
const hvyAccentMat=new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffff00,emissiveIntensity:4});
const hvyJointMat=new THREE.MeshStandardMaterial({color:0x550033,emissive:0xff00aa,emissiveIntensity:.3,metalness:.4,roughness:.6});

const rushBodyMat=new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffdd00,emissiveIntensity:2.2,metalness:.3,roughness:.5});
const rushAccentMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:5});
const rushJointMat=new THREE.MeshStandardMaterial({color:0x554400,emissive:0xffdd00,emissiveIntensity:.3,metalness:.4,roughness:.6});

const bossBodyMat=new THREE.MeshStandardMaterial({color:0xaa0000,emissive:0xaa0000,emissiveIntensity:1.2,metalness:.4,roughness:.4});
const bossAccentMat=new THREE.MeshStandardMaterial({color:0xff4444,emissive:0xff4444,emissiveIntensity:4});
const bossCoreMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:8});
const bossJointMat=new THREE.MeshStandardMaterial({color:0x440000,emissive:0xff0000,emissiveIntensity:.2,metalness:.5,roughness:.5});

const particleMatGreen=new THREE.MeshBasicMaterial({color:0x44ff88,transparent:true,opacity:1});
const particleMatPink=new THREE.MeshBasicMaterial({color:0xff44ff,transparent:true,opacity:1});
const particleMatYellow=new THREE.MeshBasicMaterial({color:0xffdd44,transparent:true,opacity:1});
const particleMatRed=new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:1});

const healthPickupMat=new THREE.MeshBasicMaterial({color:0x00ff88});
const ammoPickupMat=new THREE.MeshBasicMaterial({color:0x00e5ff});
const dmgBuffPickupMat=new THREE.MeshBasicMaterial({color:0xff4444});
const shieldPickupMat=new THREE.MeshBasicMaterial({color:0x44aaff});

const sharedGeo={
  regLeg:new THREE.BoxGeometry(.22,.8,.28),
  hvyLeg:new THREE.BoxGeometry(.24,.85,.3),
  rushLeg:new THREE.BoxGeometry(.12,.6,.18),
  knee:new THREE.SphereGeometry(.06,4,4),
  eye:new THREE.SphereGeometry(.08,6,4),
  hvyEye:new THREE.SphereGeometry(.1,6,4),
  rushEye:new THREE.SphereGeometry(.06,5,4),
  particle:new THREE.BoxGeometry(.1,.1,.1),
  bigParticle:new THREE.BoxGeometry(.16,.16,.16),
  pickup:new THREE.OctahedronGeometry(.25,0),
  ammoPickup:new THREE.BoxGeometry(.28,.28,.28),
  dmgBuffPickup:new THREE.OctahedronGeometry(.3,0),
  shieldPickup:new THREE.OctahedronGeometry(.28,1),
  zoneRing:new THREE.RingGeometry(1.8,3.2,32),
  zoneRingInner:new THREE.RingGeometry(.5,1.6,24),
};

const wallDefs=[
  {x:0,z:-ARENA/2,w:ARENA,d:1.5,h:WALL_H},{x:0,z:ARENA/2,w:ARENA,d:1.5,h:WALL_H},
  {x:-ARENA/2,z:0,w:1.5,d:ARENA,h:WALL_H},{x:ARENA/2,z:0,w:1.5,d:ARENA,h:WALL_H},
  {x:0,z:0,w:5,d:5,h:3.2},
  {x:-13,z:-10,w:8,d:1,h:3},{x:-17,z:-6,w:1,d:8,h:3},
  {x:13,z:-10,w:8,d:1,h:3},{x:17,z:-6,w:1,d:8,h:3},
  {x:-13,z:10,w:8,d:1,h:3},{x:-17,z:6,w:1,d:8,h:3},
  {x:13,z:10,w:8,d:1,h:3},{x:17,z:6,w:1,d:8,h:3},
  {x:-23,z:0,w:1,d:10,h:3},{x:23,z:0,w:1,d:10,h:3},
  {x:0,z:-19,w:10,d:1,h:3},{x:0,z:19,w:10,d:1,h:3},
  {x:-8,z:-20,w:2,d:2,h:3},{x:8,z:-20,w:2,d:2,h:3},
  {x:-8,z:20,w:2,d:2,h:3},{x:8,z:20,w:2,d:2,h:3},
  {x:-6,z:-5,w:3,d:1,h:2.5},{x:6,z:5,w:3,d:1,h:2.5},
  {x:-6,z:5,w:1,d:3,h:2.5},{x:6,z:-5,w:1,d:3,h:2.5},
];

const spawnPoints=[
  [-24,-24],[24,-24],[-24,24],[24,24],
  [-24,0],[24,0],[0,-24],[0,24],
  [-18,-18],[18,-18],[-18,18],[18,18],
  [-12,0],[12,0],[0,-12],[0,12],
];

/* ===== AUDIO ===== */
function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
  if(!audioCtx)return;try{audioCtx.resume()}catch(e){}
  const t=audioCtx.currentTime;
  switch(type){
    case'shoot':{const l=.09,b=audioCtx.createBuffer(1,audioCtx.sampleRate*l|0,audioCtx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);const s=audioCtx.createBufferSource();s.buffer=b;const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(2200,t);f.frequency.exponentialRampToValueAtTime(150,t+l);const g=audioCtx.createGain();g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+l);s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start(t);break}
    case'shotgun':{const l=.14,b=audioCtx.createBuffer(1,audioCtx.sampleRate*l|0,audioCtx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.8)*.8;const s=audioCtx.createBufferSource();s.buffer=b;const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(800,t);f.frequency.exponentialRampToValueAtTime(80,t+l);const g=audioCtx.createGain();g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+l);s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start(t);break}
    case'hit':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(200,t+.04);const g=audioCtx.createGain();g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.05);break}
    case'kill':{const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(80,t+.25);const g=audioCtx.createGain();g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.26);break}
    case'boss_kill':{for(let k=0;k<3;k++){const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300-k*60,t+k*.08);o.frequency.exponentialRampToValueAtTime(40,t+k*.08+.4);const g=audioCtx.createGain();g.gain.setValueAtTime(.2,t+k*.08);g.gain.exponentialRampToValueAtTime(.001,t+k*.08+.4);o.connect(g);g.connect(audioCtx.destination);o.start(t+k*.08);o.stop(t+k*.08+.42)}break}

    case'pickup':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(900,t+.12);const g=audioCtx.createGain();g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.13);break}

/* ===== MAP ===== */
function buildMap(){
  const floorTex=makeFloorTex();
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(ARENA,ARENA),new THREE.MeshLambertMaterial({map:floorTex,color:0x333350}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(ARENA,ARENA),new THREE.MeshLambertMaterial({color:0x181828}));
  ceil.rotation.x=Math.PI/2;ceil.position.y=WALL_H;scene.add(ceil);

  const wallMat=new THREE.MeshLambertMaterial({color:0x303058});
  const glowCyan=new THREE.MeshBasicMaterial({color:0x00e5ff});
  const glowRed=new THREE.MeshBasicMaterial({color:0xff2d2d});

  wallDefs.forEach((w,i)=>{
    const geo=new THREE.BoxGeometry(Math.max(.1,w.w),Math.max(.1,w.h),Math.max(.1,w.d));
    const mesh=new THREE.Mesh(geo,wallMat);mesh.position.set(w.x,w.h/2,w.z);scene.add(mesh);
    const sGeo=new THREE.BoxGeometry(Math.max(.1,w.w+.02),.08,Math.max(.1,w.d+.02));
    const strip=new THREE.Mesh(sGeo,i%2===0?glowCyan:glowRed);strip.position.set(w.x,.04,w.z);scene.add(strip);
    wallBoxes.push({minX:w.x-w.w/2,maxX:w.x+w.w/2,minZ:w.z-w.d/2,maxZ:w.z+w.d/2});
  });

  const lGeo=new THREE.PlaneGeometry(1.5,.4);
  const lC=new THREE.MeshBasicMaterial({color:0x00e5ff,side:THREE.DoubleSide});
  const lR=new THREE.MeshBasicMaterial({color:0xff2d2d,side:THREE.DoubleSide});
  for(let x=-24;x<=24;x+=8)for(let z=-24;z<=24;z+=8){
    const m=new THREE.Mesh(lGeo,(x+z)%16===0?lC:lR);m.rotation.x=Math.PI/2;m.position.set(x,WALL_H-.01,z);scene.add(m);
  }
}
function makeFloorTex(){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');ctx.fillStyle='#1a1a30';ctx.fillRect(0,0,128,128);
  ctx.strokeStyle='#2a2a4e';ctx.lineWidth=1;
  for(let i=0;i<=128;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,128);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(128,i);ctx.stroke()}
  const tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(14,14);return tex;
}

/* ===== WAVE SPAWNING ===== */
function spawnWave(n){
  const maxE=getMaxEnemies(n);
  let regC=3+n*2, hvyC=Math.max(0,Math.floor((n-1)/1.5));
  let rushC=Math.max(0,Math.floor((n-3)*1.5)); // rushers from wave 4
  let bossC=(n%5===0&&n>0)?1:0;

  /* Cap total to maxE */
  let total=regC+hvyC+rushC+bossC;
  if(total>maxE){
    const cut=total-maxE;
    regC=Math.max(0,regC-cut);
  }

  const types=[];
  for(let i=0;i<regC;i++)types.push('regular');
  for(let i=0;i<hvyC;i++)types.push('heavy');
  for(let i=0;i<rushC;i++)types.push('rusher');
  for(let i=0;i<bossC;i++)types.push('boss');

  /* Shuffle so boss isn't always last */
  for(let i=types.length-1;i>0;i--){const j=Math.random()*i|0;[types[i],types[j]]=[types[j],types[i]]}

  for(const type of types){
    if(enemies.length>=maxE)break;
    const sp=spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
    let px=sp[0]+(Math.random()-.5)*4, pz=sp[1]+(Math.random()-.5)*4;
    const pos=new THREE.Vector3(px,0,pz);
    if(pos.distanceTo(playerBody.position)<12){pos.x*=-1;pos.z*=-1}
    if(!collidesWithWalls(pos,EB[type].radius))
      enemies.push(createEnemy(type,pos,n));
  }

  /* Damage zones from wave 4+ */
  if(n>=4)spawnDamageZones(n);
}

function spawnDamageZones(n){
  clearDamageZones();
  const count=Math.min(5,n-3);
  const zoneMat=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.18,side:THREE.DoubleSide});
  const zoneMatInner=new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:.12,side:THREE.DoubleSide});
  for(let i=0;i<count;i++){
    const ring=new THREE.Mesh(sharedGeo.zoneRing,zoneMat.clone());
    ring.rotation.x=-Math.PI/2;ring.position.y=.03;
    const inner=new THREE.Mesh(sharedGeo.zoneRingInner,zoneMatInner.clone());
    inner.rotation.x=-Math.PI/2;inner.position.y=.03;

    let px,pz,attempts=0;
    do{px=(Math.random()-.5)*(ARENA-12);pz=(Math.random()-.5)*(ARENA-12);attempts++}
    while(playerBody.position.distanceTo(new THREE.Vector3(px,0,pz))<8&&attempts<20);

    const grp=new THREE.Group();
    grp.add(ring);grp.add(inner);
    grp.position.set(px,0,pz);
    const zLight=new THREE.PointLight(0xff4400,.8,10);zLight.position.set(0,1.5,0);grp.add(zLight);
    scene.add(grp);
    damageZones.push({group:grp,x:px,z:pz,radius:3.2,dps:8+wave});
  }
}
function clearDamageZones(){damageZones.forEach(z=>scene.remove(z.group));damageZones=[]}

/* ===== ENEMY KILL ===== */
function killEnemy(enemy){
  const isBoss=enemy.type==='boss';
  const baseScore=isBoss?500:enemy.type==='heavy'?200:enemy.type==='rusher'?50:100;

  /* Combo */
  if(comboTimer>0){comboCount++;if(comboCount>bestCombo)bestCombo=comboCount}
  else comboCount=1;
  comboTimer=COMBO_WINDOW;

  const mult=Math.min(comboCount,8);
  score+=baseScore*mult;totalKills++;

  if(comboCount>=2){playSound('combo');updateComboDisplay()}

  const pMat=isBoss?particleMatRed:enemy.type==='rusher'?particleMatYellow:enemy.type==='heavy'?particleMatPink:particleMatGreen;
  const pCount=isBoss?18:enemy.type==='rusher'?5:8;
  const pGeo=isBoss?sharedGeo.bigParticle:sharedGeo.particle;
  createDeathParticles(enemy.group.position.clone(),pCount,pMat,pGeo);

  const deathPos=enemy.group.position.clone();
  scene.remove(enemy.group);
  enemies=enemies.filter(e=>e!==enemy);

  if(isBoss){playSound('boss_kill');bossRef=null;document.getElementById('bossHP').style.display='none'}
  else playSound('kill');
  addKillMsg(enemy.type,mult);

  /* Drops */
  spawnPickup(deathPos,'ammo',enemy.type==='boss'?40:enemy.type==='rusher'?5:10);
  if(Math.random()<(isBoss?.9:.25)){
    const hPos=deathPos.clone();hPos.x+=.8;
    spawnPickup(hPos,'health',isBoss?50:25);
  }
  /* Power-up drops: ~15% from regular/heavy, 100% from boss */
  if(isBoss||Math.random()<.15){
    const pPos=deathPos.clone();pPos.x-=.8;pPos.z+=.5;
    spawnPickup(pPos,Math.random()<.5?'damageBuff':'shield',0);
  }
}

function createDeathParticles(pos,count,mat,geo){
  const g=new THREE.Group();
  for(let i=0;i<count;i++){
    const m=new THREE.Mesh(geo,mat.clone());
    m.position.set(pos.x+(Math.random()-.5)*.8,pos.y+Math.random()*1.8,pos.z+(Math.random()-.5)*.8);
    m.userData.vel=new THREE.Vector3((Math.random()-.5)*(count>10?8:5),Math.random()*5+1,(Math.random()-.5)*(count>10?8:5));
    m.userData.life=.5+Math.random()*.5;
    g.add(m);
  }
  scene.add(g);particleSystems.push(g);
}

/* ===== PICKUPS ===== */
function spawnPickup(pos,type,amount){
  let mat,geo;
  if(type==='health'){mat=healthPickupMat;geo=sharedGeo.pickup}
  else if(type==='ammo'){mat=ammoPickupMat;geo=sharedGeo.ammoPickup}
  else if(type==='damageBuff'){mat=dmgBuffPickupMat;geo=sharedGeo.dmgBuffPickup}
  else{mat=shieldPickupMat;geo=sharedGeo.shieldPickup}
  const m=new THREE.Mesh(geo,mat);
  m.position.set(pos.x,.5,pos.z);scene.add(m);
  pickups.push({mesh:m,type,amount});
}

/* ===== COLLISION ===== */
function collidesWithWalls(pos,r){
  for(const w of wallBoxes)if(pos.x+r>w.minX&&pos.x-r<w.maxX&&pos.z+r>w.minZ&&pos.z-r<w.maxZ)return true;
  return false;
}
function tryMove(cur,des,r){
  if(!collidesWithWalls(des,r))return des.clone();
  let tx=new THREE.Vector3(des.x,cur.y,cur.z);if(!collidesWithWalls(tx,r))return tx;
  let tz=new THREE.Vector3(cur.x,cur.y,des.z);if(!collidesWithWalls(tz,r))return tz;
  return cur.clone();
}
function findEnemyByObj(obj){let c=obj;while(c){const e=enemies.find(en=>en.group===c);if(e)return e;c=c.parent}return null}

/* ===== SHOOTING ===== */
function getDmg(){
  let d=WCONFIG[currentWeaponIdx].dmg;
  if(damageBuffTimer>0)d*=2;
  return d;
}

function shoot(){
  const w=wState[currentWeaponIdx],cfg=WCONFIG[currentWeaponIdx];
  if(!w.canShoot||w.isReloading)return;
  if(w.ammo<=0){playSound('empty');if(w.reserve>0)reload();return}
  w.canShoot=false;w.ammo--;
  setTimeout(()=>w.canShoot=true,cfg.rate);

  playSound(currentWeaponIdx===0?'shoot':'shotgun');

  /* Muzzle flash */
  const fl=weaponGroup.userData.flashLight;
  const fm=weaponGroup.userData.flashMesh;
  if(fl)fl.intensity=currentWeaponIdx===0?3:5;
  if(fm)fm.material.opacity=.9;
  setTimeout(()=>{if(fl)fl.intensity=0;if(fm)fm.material.opacity=0},50);
  weaponRecoil=currentWeaponIdx===0?.06:.12;

  const rc=new THREE.Raycaster();rc.far=currentWeaponIdx===1?(cfg.range||22):60;

  if(currentWeaponIdx===1){
    /* Shotgun: spread pellets */
    const pellets=cfg.pellets||8;const spread=cfg.spread||.09;
    let hitAny=false;
    const meshes=[];enemies.forEach(e=>e.group.traverse(c=>{if(c.isMesh)meshes.push(c)}));
    const dmg=getDmg();
    for(let i=0;i<pellets;i++){
      rc.setFromCamera(new THREE.Vector2((Math.random()-.5)*2*spread,(Math.random()-.5)*2*spread),camera);
      const hits=rc.intersectObjects(meshes,false);
      if(hits.length>0){
        const he=findEnemyByObj(hits[0].object);
        if(he){he.health-=dmg;he.flashTimer=.1;hitAny=true;if(he.health<=0)killEnemy(he)}
      }
    }
    if(hitAny){playSound('hit');hitMarkerTimer=.1}
  }else{
    /* Rifle: single ray */
    rc.setFromCamera(new THREE.Vector2(0,0),camera);
    const meshes=[];enemies.forEach(e=>e.group.traverse(c=>{if(c.isMesh)meshes.push(c)}));
    const hits=rc.intersectObjects(meshes,false);
    if(hits.length>0){
      const he=findEnemyByObj(hits[0].object);
      if(he){he.health-=getDmg();he.flashTimer=.1;playSound('hit');hitMarkerTimer=.1;if(he.health<=0)killEnemy(he)}
    }
  }
  updateHUD();
  if(w.ammo<=0&&w.reserve>0)reload();
}

function reload(){
  const w=wState[currentWeaponIdx],cfg=WCONFIG[currentWeaponIdx];
  if(w.isReloading||w.ammo===cfg.mag||w.reserve<=0)return;
  w.isReloading=true;w.reloadStart=performance.now();playSound('reload');
  document.getElementById('reloadBar').classList.add('show');
}
function updateReload(){
  const w=wState[currentWeaponIdx],cfg=WCONFIG[currentWeaponIdx];
  if(!w.isReloading)return;
  const pct=Math.min(1,(performance.now()-w.reloadStart)/cfg.reload);
  document.getElementById('reloadFill').style.width=(pct*100)+'%';
  if(pct>=1){
    const need=cfg.mag-w.ammo,a=Math.min(need,w.reserve);
    w.ammo+=a;w.reserve-=a;w.isReloading=false;
    document.getElementById('reloadBar').classList.remove('show');
    document.getElementById('reloadFill').style.width='0%';updateHUD();
  }
}

/* ===== WEAPON SWITCH ===== */
function switchWeapon(idx){
  if(idx===currentWeaponIdx||isDashing)return;
  wState[currentWeaponIdx].isReloading=false;
  currentWeaponIdx=idx;
  weaponGroups.forEach((g,i)=>g.visible=(i===idx));
  weaponGroup=weaponGroups[idx];
  document.getElementById('reloadBar').classList.remove('show');
  document.getElementById('reloadFill').style.width='0%';
  updateHUD();
}

/* ===== DASH ===== */
function doDash(){
  if(dashCooldown>0||isDashing)return;
  isDashing=true;dashTimer=DASH_DUR;dashCooldown=DASH_CD;
  invulnTimer=Math.max(invulnTimer,DASH_DUR+.1);
  dashDir.set(0,0,0);
  if(moveF)dashDir.z-=1;if(moveB)dashDir.z+=1;if(moveL)dashDir.x-=1;if(moveR)dashDir.x+=1;
  if(dashDir.length()<.1)dashDir.set(0,0,-1);
  dashDir.normalize();dashDir.applyAxisAngle(new THREE.Vector3(0,1,0),playerBody.rotation.y);
  playSound('dash');
}

/* ===== CONTROLS ===== */
function setupControls(){
  document.addEventListener('keydown',e=>{
    if(gameState!=='playing')return;
    switch(e.code){
      case'KeyW':moveF=true;break;case'KeyS':moveB=true;break;
      case'KeyA':moveL=true;break;case'KeyD':moveR=true;break;
      case'ShiftLeft':case'ShiftRight':sprint=true;break;
      case'KeyR':reload();break;
      case'Digit1':switchWeapon(0);break;case'Digit2':switchWeapon(1);break;
      case'Space':e.preventDefault();doDash();break;
    }
  });
  document.addEventListener('keyup',e=>{switch(e.code){
    case'KeyW':moveF=false;break;case'KeyS':moveB=false;break;
    case'KeyA':moveL=false;break;case'KeyD':moveR=false;break;
    case'ShiftLeft':case'ShiftRight':sprint=false;break;
  }});
  document.addEventListener('mousedown',e=>{if(e.button===0){mouseDown=true;if(gameState==='playing')shoot()}});
  document.addEventListener('mouseup',e=>{if(e.button===0)mouseDown=false});
  document.addEventListener('mousemove',e=>{
    if(gameState!=='playing'||!document.pointerLockElement)return;
    playerBody.rotation.y-=e.movementX*.002;
    playerHead.rotation.x=Math.max(-1.4,Math.min(1.4,playerHead.rotation.x-e.movementY*.002));
    weaponSwayX-=e.movementX*.0004;weaponSwayY-=e.movementY*.0003;
  });
  document.addEventListener('pointerlockchange',()=>{
    if(document.pointerLockElement===renderer.domElement){if(gameState==='paused')gameState='playing'}
    else{if(gameState==='playing')gameState='paused'}
  });
  renderer.domElement.addEventListener('click',()=>{if(gameState==='paused')renderer.domElement.requestPointerLock()});
}

/* ===== MINIMAP ===== */
function setupMinimap(){mmCtx=document.getElementById('minimapCanvas').getContext('2d')}
function drawMinimap(){
  const c=mmCtx,sz=140,sc=sz/ARENA;c.clearRect(0,0,sz,sz);
  c.fillStyle='rgba(10,10,18,.6)';c.fillRect(0,0,sz,sz);
  c.fillStyle='rgba(0,229,255,.2)';
  wallBoxes.forEach(w=>{c.fillRect((w.minX+ARENA/2)*sc,(w.minZ+ARENA/2)*sc,(w.maxX-w.minX)*sc,(w.maxZ-w.minZ)*sc)});
  /* Damage zones */
  damageZones.forEach(z=>{
    c.fillStyle='rgba(255,68,0,.25)';c.beginPath();c.arc((z.x+ARENA/2)*sc,(z.z+ARENA/2)*sc,z.radius*sc,0,Math.PI*2);c.fill();
  });
  enemies.forEach(e=>{
    c.fillStyle=e.type==='boss'?'#ff2200':e.type==='rusher'?'#ffdd00':e.type==='heavy'?'#ff00aa':'#00ff66';
    const sz=e.type==='boss'?4:2.5;
    c.beginPath();c.arc((e.group.position.x+ARENA/2)*sc,(e.group.position.z+ARENA/2)*sc,sz,0,Math.PI*2);c.fill();
  });
  pickups.forEach(p=>{
    c.fillStyle=p.type==='ammo'?'#00e5ff':p.type==='health'?'#00ff88':p.type==='damageBuff'?'#ff4444':'#44aaff';
    c.fillRect((p.mesh.position.x+ARENA/2)*sc-1.5,(p.mesh.position.z+ARENA/2)*sc-1.5,3,3);
  });
  const px=(playerBody.position.x+ARENA/2)*sc,pz=(playerBody.position.z+ARENA/2)*sc;
  c.fillStyle='#00e5ff';c.beginPath();c.arc(px,pz,3,0,Math.PI*2);c.fill();
  const dx=Math.sin(playerBody.rotation.y)*8,dz=Math.cos(playerBody.rotation.y)*8;
  c.strokeStyle='#00e5ff';c.lineWidth=1.5;c.beginPath();c.moveTo(px,pz);c.lineTo(px-dx,pz-dz);c.stroke();
}

/* ===== HUD ===== */
function updateHUD(){
  const w=wState[currentWeaponIdx],cfg=WCONFIG[currentWeaponIdx];
  document.getElementById('hpFill').style.width=Math.max(0,playerHealth)+'%';
  document.getElementById('hpVal').textContent=Math.max(0,Math.round(playerHealth));
  document.getElementById('ammoCur').textContent=w.ammo;
  document.getElementById('ammoRes').textContent='/ '+w.reserve;
  document.getElementById('weaponLabel').textContent=cfg.name;
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('waveVal').textContent='WAVE '+wave;
  document.getElementById('slot1').className='weapon-slot'+(currentWeaponIdx===0?' active':'');
  document.getElementById('slot2').className='weapon-slot'+(currentWeaponIdx===1?' active':'');
  /* Dash bar */
  const dashPct=Math.max(0,1-dashCooldown/DASH_CD)*100;
  document.getElementById('dashFill').style.width=dashPct+'%';
  /* Buffs */
  const bd=document.getElementById('buffDisplay');bd.innerHTML='';
  if(damageBuffTimer>0){const el=document.createElement('div');el.className='buff-item buff-damage';el.textContent='DMG x2 '+Math.ceil(damageBuffTimer)+'s';bd.appendChild(el)}
  if(shieldHP>0){const el=document.createElement('div');el.className='buff-item buff-shield';el.textContent='SHIELD '+Math.round(shieldHP);bd.appendChild(el)}
  /* Boss HP */
  if(bossRef){
    document.getElementById('bossHP').style.display='flex';
    document.getElementById('bossHPFill').style.width=Math.max(0,(bossRef.health/bossRef.maxHealth)*100)+'%';
  }
}
function updateComboDisplay(){
  const el=document.getElementById('comboDisplay');
  if(comboCount>=2){el.classList.add('show');document.getElementById('comboVal').textContent='x'+comboCount}
  else el.classList.remove('show');
}
function addKillMsg(type,mult){
  const el=document.createElement('div');el.className='kill-msg kill-'+type;
  const base=type==='boss'?'OVERLORD DESTROYED':type==='rusher'?'Rusher Eliminated':type==='heavy'?'Heavy Drone Eliminated':'Drone Eliminated';
  const scoreTxt=mult>1?' ('+mult+'x)':'';
  el.textContent=base+' +'+((type==='boss'?500:type==='rusher'?50:type==='heavy'?200:100)*mult)+scoreTxt;
  document.getElementById('killFeed').appendChild(el);setTimeout(()=>el.remove(),2500);
}
function addPickupMsg(type,amount){
  const el=document.createElement('div');
  el.className='kill-msg '+(type==='health'?'pickup-health':'pickup');
  if(type==='damageBuff')el.textContent='DAMAGE BOOST x2';
  else if(type==='shield')el.textContent='SHIELD ACTIVE';
  else if(type==='ammo')el.textContent='+'+amount+' AMMO';
  else el.textContent='+'+amount+' HP';
  document.getElementById('killFeed').appendChild(el);setTimeout(()=>el.remove(),2300);
}
function showWaveAnnounce(n,count,text){
  const el=document.getElementById('waveAnnounce');
  document.getElementById('waveText').textContent=text||('WAVE '+n);
  const sub=document.getElementById('waveSubtext');
  if(n%5===0&&n>0)sub.textContent='OVERLORD INCOMING';
  else if(n>=8)sub.textContent='SWARM DETECTED — '+count+' HOSTILES';
  else sub.textContent=count+' HOSTILES INCOMING';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);
}

/* ===== GAME STATE ===== */
function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('gameOver').style.display='none';
  gameState='playing';if(!audioCtx)initAudio();
  renderer.domElement.requestPointerLock();resetGame();
}
function resetGame(){
  playerHealth=100;shieldHP=0;damageBuffTimer=0;
  wState[0].ammo=30;wState[0].reserve=120;wState[0].canShoot=true;wState[0].isReloading=false;
  wState[1].ammo=8;wState[1].reserve=48;wState[1].canShoot=true;wState[1].isReloading=false;
  currentWeaponIdx=0;weaponGroups.forEach((g,i)=>g.visible=(i===0));weaponGroup=weaponGroups[0];
  score=0;wave=0;totalKills=0;comboCount=0;comboTimer=0;bestCombo=0;
  canShoot=true;mouseDown=false;
  moveF=moveB=moveL=moveR=sprint=false;invulnTimer=0;screenShake=0;
  dashCooldown=0;isDashing=false;dashTimer=0;
  playerBody.position.set(0,0,20);playerBody.rotation.y=0;playerHead.rotation.x=0;
  enemies.forEach(e=>scene.remove(e.group));enemies=[];bossRef=null;
  pickups.forEach(p=>scene.remove(p.mesh));pickups=[];
  particleSystems.forEach(g=>scene.remove(g));particleSystems=[];
  clearDamageZones();
  document.getElementById('reloadBar').classList.remove('show');
  document.getElementById('reloadFill').style.width='0%';
  document.getElementById('pauseMsg').classList.remove('show');
  document.getElementById('bossHP').style.display='none';
  document.getElementById('comboDisplay').classList.remove('show');
  wavePending=true;waveTimer=1.5;updateHUD();
}
function gameOver(){
  gameState='gameover';document.exitPointerLock();
  document.getElementById('gameOver').style.display='flex';
  document.getElementById('goStats').innerHTML=
    `Score: <span>${score}</span><br>Wave Reached: <span>${wave}</span><br>Enemies Destroyed: <span>${totalKills}</span><br>Best Combo: <span>x${bestCombo}</span>`;
}

/* ===== MAIN LOOP ===== */
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  if(gameState==='playing'){
    updatePlayer(dt);updateWeapon(dt);updateReload();
    updateEnemies(dt);updateParticles(dt);updatePickups(dt);
    updateWaveLogic(dt);updateDamageFlash(dt);updateHitMarker(dt);
    updateCombo(dt);updateDamageZones(dt);updateBuffs(dt);
    if(mouseDown&&wState[currentWeaponIdx].canShoot&&!wState[currentWeaponIdx].isReloading)shoot();
    drawMinimap();updateHUD();
  }
  const pm=document.getElementById('pauseMsg');
  if(gameState==='paused')pm.classList.add('show');else pm.classList.remove('show');
  renderer.render(scene,camera);
}

function updatePlayer(dt){
  /* Dash movement takes priority */
  if(isDashing){
    dashTimer-=dt;
    const np=playerBody.position.clone().addScaledVector(dashDir,DASH_SPEED*dt);
    playerBody.position.copy(tryMove(playerBody.position,np,PLAYER_R));
    camera.fov+=(95-camera.fov)*10*dt;camera.updateProjectionMatrix();
    if(dashTimer<=0)isDashing=false;
    return;
  }
  if(dashCooldown>0)dashCooldown-=dt;

  const spd=MOVE_SPEED*(sprint&&damageBuffTimer<=0?SPRINT_MULT:damageBuffTimer>0?SPRINT_MULT:1)*(sprint?1:1);
  const actualSpd=MOVE_SPEED*(sprint?SPRINT_MULT:1)*(damageBuffTimer>0?1.15:1);
  const dir=new THREE.Vector3();
  if(moveF)dir.z-=1;if(moveB)dir.z+=1;if(moveL)dir.x-=1;if(moveR)dir.x+=1;
  if(dir.length()>0){
    dir.normalize();dir.applyAxisAngle(new THREE.Vector3(0,1,0),playerBody.rotation.y);
    const np=playerBody.position.clone().add(dir.clone().multiplyScalar(actualSpd*dt));
    playerBody.position.copy(tryMove(playerBody.position,np,PLAYER_R));
  }
  const wantFov=sprint&&dir.length()>0?85:75;
  camera.fov+=(wantFov-camera.fov)*8*dt;camera.updateProjectionMatrix();
  if(invulnTimer>0)invulnTimer-=dt;
  if(screenShake>0){
    playerHead.position.x=(Math.random()-.5)*screenShake;
    playerHead.position.y=PLAYER_H+(Math.random()-.5)*screenShake;
    screenShake*=Math.pow(.05,dt);
    if(screenShake<.001){screenShake=0;playerHead.position.x=0;playerHead.position.y=PLAYER_H}
  }
}

function updateWeapon(dt){
  weaponRecoil*=Math.pow(.001,dt);if(weaponRecoil<.001)weaponRecoil=0;
  weaponSwayX*=Math.pow(.02,dt);weaponSwayY*=Math.pow(.02,dt);
  const isM=moveF||moveB||moveL||moveR;
  weaponBob+=dt*(isM?(sprint?14:10):1.5);
  const bx=isM?Math.cos(weaponBob*.5)*.006:Math.sin(weaponBob)*.001;
  const by=isM?Math.sin(weaponBob)*.008:Math.sin(weaponBob)*.002;
  const rd=wState[currentWeaponIdx].isReloading?-.12:0;
  weaponGroup.position.set(weaponBasePos.x+bx+weaponSwayX,weaponBasePos.y+by+weaponSwayY+rd-weaponRecoil*.3,weaponBasePos.z-weaponRecoil);
  weaponGroup.rotation.x=-weaponRecoil*1.5+weaponSwayY;weaponGroup.rotation.y=weaponSwayX*2;
}

function updateEnemies(dt){
  const pPos=playerBody.position;

  enemies.forEach(e=>{
    /* Hit flash */
    if(e.flashTimer>0){
      e.flashTimer-=dt;
      if(!e.isFlashing){e.isFlashing=true;e.group.traverse(c=>{if(c.isMesh)c.material=flashMat})}
    }else if(e.isFlashing){
      e.isFlashing=false;
      e.group.traverse(c=>{
        if(!c.isMesh)return;
        const g=c.userData.matGroup;
        if(g==='body')c.material=e.bodyMat;else if(g==='accent')c.material=e.accentMat;
        else if(g==='joint')c.material=e.jointMat;else c.material=e.bodyMat;
      });
    }

    /* Attack lunge */
    if(e.attackAnimTimer>0){
      e.attackAnimTimer-=dt;
      const t=Math.max(0,e.attackAnimTimer)/.2;
      const lungeAmt=Math.sin(t*Math.PI)*(e.type==='boss'?.4:.15);
      const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(e.group.quaternion);
      e.group.position.addScaledVector(fwd,lungeAmt);
    }

    /* Boss summons rushers at 50% HP */
    if(e.type==='boss'&&!e.bossSummoned&&e.health<=e.maxHealth*.5){
      e.bossSummoned=true;
      for(let i=0;i<3&&enemies.length<getMaxEnemies(wave);i++){
        const sp=[-2,0,2];const pos=e.group.position.clone();
        pos.x+=sp[i];pos.z+=sp[i];
        if(!collidesWithWalls(pos,.35))enemies.push(createEnemy('rusher',pos,wave));
      }
    }

    /* Direction and distance */
    const toP=new THREE.Vector3().subVectors(pPos,e.group.position);toP.y=0;
    const dist=toP.length();
    if(dist>.1)e.group.lookAt(pPos.x,e.group.position.y,pPos.z);

    /* Movement with wall avoidance */
    const detect=e.type==='rusher'?40:EB[e.type].atkRange<4?50:50;
    if(dist<50&&dist>EB[e.type].atkRange){
      const dir=toP.clone().normalize();
      const step=e.speed*dt;
      const np=e.group.position.clone().add(dir.clone().multiplyScalar(step));
      const moved=tryMove(e.group.position,np,e.radius);

      if(moved.distanceTo(e.group.position)<0.001){
        e.stuckTimer+=dt;
        const perp=new THREE.Vector3(-dir.z,0,dir.x);
        if(perp.dot(new THREE.Vector3(pPos.x-e.group.position.x,0,pPos.z-e.group.position.z))<0)perp.negate();
        let am=tryMove(e.group.position,e.group.position.clone().add(perp.clone().multiplyScalar(step)),e.radius);
        if(am.distanceTo(e.group.position)<.001){perp.negate();am=tryMove(e.group.position,e.group.position.clone().add(perp.clone().multiplyScalar(step)),e.radius)}
        if(am.distanceTo(e.group.position)<.001){const r=new THREE.Vector3(Math.random()-.5,0,Math.random()-.5).normalize();am=tryMove(e.group.position,e.group.position.clone().add(r.multiplyScalar(step)),e.radius)}
        e.group.position.copy(am);
      }else{e.stuckTimer=0;e.group.position.copy(moved)}
    }else{e.stuckTimer=0}

    /* Attack */
    if(dist<EB[e.type].atkRange){
      e.attackCooldown-=dt;
      if(e.attackCooldown<=0){
        e.attackCooldown=e.attackRate;e.attackAnimTimer=e.type==='boss'?.3:.2;
        if(invulnTimer<=0){
          let dmg=e.damage;
          if(shieldHP>0){const absorbed=Math.min(shieldHP,dmg);shieldHP-=absorbed;dmg-=absorbed}
          if(dmg>0){playerHealth-=dmg}
          invulnTimer=INVULN_TIME;screenShake=e.type==='boss'?.15:.08;damageFlashTimer=.2;playSound('damage');
          if(playerHealth<=0){playerHealth=0;updateHUD();gameOver()}
        }
      }
    }else{e.attackCooldown=Math.max(0,e.attackCooldown-dt)}

    /* Hover bob */
    e.group.position.y=Math.sin(performance.now()*.005+e.group.id)*.03;

    /* Boss pulse glow on cores — traverse accent meshes */
    if(e.type==='boss'){
      const pulse=Math.sin(performance.now()*.006)*.5+.5;
      e.group.traverse(c=>{
        if(c.isMesh&&c.userData.matGroup==='accent'){
          if(c.material!==flashMat){
            c.material.emissiveIntensity=4+pulse*6;
          }
        }
      });
    }

    /* Rusher lean forward when moving */
    if(e.type==='rusher'&&dist<50){
      const leanAmt=Math.min(.25,((performance.now()*.008)%1)*.3);
      e.group.rotation.x=leanAmt;
    }
  });
}

function updateParticles(dt){
  for(let i=particleSystems.length-1;i>=0;i--){
    const g=particleSystems[i];let dead=true;
    g.children.forEach(p=>{
      if(p.userData.life>0){
        p.userData.life-=dt;p.position.addScaledVector(p.userData.vel,dt);
        p.userData.vel.y-=9.8*dt;
        p.material.opacity=Math.max(0,p.userData.life);
        p.scale.multiplyScalar(.97);dead=false;
      }
    });
    if(dead){scene.remove(g);particleSystems.splice(i,1)}
  }
}

function updatePickups(dt){
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    p.mesh.rotation.y+=2*dt;p.mesh.rotation.x+=dt*1.5;
    p.mesh.position.y=.5+Math.sin(performance.now()*.003+i)*.15;
    if(playerBody.position.distanceTo(p.mesh.position)<1.5){
      if(p.type==='ammo'){wState[currentWeaponIdx].reserve+=p.amount;addPickupMsg('ammo',p.amount)}
      else if(p.type==='health'){playerHealth=Math.min(100,playerHealth+p.amount);addPickupMsg('health',p.amount)}
      else if(p.type==='damageBuff'){damageBuffTimer=12;addPickupMsg('damageBuff',0)}
      else if(p.type==='shield'){shieldHP=Math.min(shieldHP+40,60);addPickupMsg('shield',0)}
      scene.remove(p.mesh);pickups.splice(i,1);
      playSound('pickup');updateHUD();
    }
  }
}

function updateDamageZones(dt){
  const inZone=damageZones.some(z=>{
    const dx=playerBody.position.x-z.x,dz=playerBody.position.z-z.z;
    return Math.sqrt(dx*dx+dz*dz)<z.radius;
  });
  const zf=document.getElementById('zoneFlash');
  if(inZone&&invulnTimer<=0){
    playerHealth-=8*dt; // damage per second scaled by dt
    damageFlashTimer=Math.max(damageFlashTimer,.05);
    zf.classList.add('show');
    if(playerHealth<=0){playerHealth=0;updateHUD();gameOver()}
  }else{zf.classList.remove('show')}
  /* Pulse animation on zone rings */
  damageZones.forEach((z,idx)=>{
    z.group.children.forEach(c=>{
      if(c.isMesh){
        c.material.opacity=.12+Math.sin(performance.now()*.004+idx)*.08;
      }
    });
  });
}

function updateCombo(dt){
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){comboCount=0;updateComboDisplay()}}
}

function updateBuffs(dt){
  if(damageBuffTimer>0){damageBuffTimer-=dt;if(damageBuffTimer<=0)damageBuffTimer=0}
}

function updateWaveLogic(dt){
  if(wavePending){waveTimer-=dt;if(waveTimer<=0){
    wavePending=false;wave++;
    const maxE=getMaxEnemies(wave);
    let text;
    if(wave%5===0)text='WAVE '+wave+' — BOSS';
    else if(wave>=8)text='WAVE '+wave+' — SWARM';
    else text='WAVE '+wave;
    spawnWave(wave);
    showWaveAnnounce(wave,maxE,text);
    updateHUD();
  }return}
  if(enemies.length===0){wavePending=true;waveTimer=2.5;clearDamageZones()}
}

function updateDamageFlash(dt){
  const o=document.getElementById('damageOverlay');
  if(damageFlashTimer>0){damageFlashTimer-=dt;o.classList.add('show')}else o.classList.remove('show')
}
function updateHitMarker(dt){
  const e=document.getElementById('hitMarker');
  if(hitMarkerTimer>0){hitMarkerTimer-=dt;e.classList.add('show')}else e.classList.remove('show')
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
window.addEventListener('resize',()=>{if(!camera||!renderer)return;camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

init();
</script>
