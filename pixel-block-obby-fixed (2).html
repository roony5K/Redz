v><button class="btn-grey" onclick="goBackFromLevels()">BACK</button></div><div id="settings-screen" class="screen"><h2>SETTINGS</h2><div class="setting-row"><span>Music</span><div class="toggle-switch active" onclick="toggleSetting(this)"><div class="toggle-knob"></div></div></div><div class="setting-row"><span>Sound</span><div class="toggle-switch active" onclick="toggleSetting(this)"><div class="toggle-knob"></div></div></div><button class="btn-red" onclick="handleResetClick()" style="margin-top: 30px;">RESET PROGRESS</button><button class="btn-red" onclick="if(confirm('Delete ALL saved data including level edits?')){localStorage.clear();alert('All data cleared! Reload the page.');}" style="font-size:20px;padding:10px 20px;">CLEAR ALL DATA</button><button class="btn-grey" onclick="goBackFromSettings()">BACK</button></div><div id="pause-screen" class="screen"><h2>PAUSED</h2><button onclick="resumeGame()">RESUME</button><button class="btn-blue" onclick="showScreen('level-screen')">LEVELS</button><button class="btn-grey" onclick="showScreen('settings-screen')">SETTINGS</button><button class="btn-blue" onclick="showScreen('editor-screen'); editorInit();">LEVEL EDITOR</button><button class="btn-blue" onclick="backToEditor()">BACK TO EDITOR</button><button class="btn-red" onclick="returnToMenu()">MAIN MENU</button></div><div id="hud"><div id="level-text">LEVEL 1</div><div id="death-text" style="color:#f44336;font-size:20px;font-weight:bold;text-shadow:2px 2px 0 #000;">DEATHS: 0</div><div id="time-text" style="color:#FFEB3B;font-size:18px;font-weight:bold;text-shadow:2px 2px 0 #000;display:none;"></div><div id="wind-text">WIND >></div><div id="fog-text">FOG RISING!</div><button id="pause-btn" class="btn-grey" onclick="pauseGame()">||</button></div><div id="unlock-popup"></div><div id="mobile-controls"><div id="left-btn" class="touch-btn">◀</div><div id="right-btn" class="touch-btn">▶</div><div id="jump-btn" class="touch-btn">JUMP</div></div><script>var _ls;try{_ls=local
