<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>One Pixel Obby</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Courier New',monospace;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  #gameContainer{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
  .overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity 0.4s}
  #startScreen{background:rgba(5,5,15,0.96)}
  #levelScreen{background:rgba(5,5,15,0.93);display:none}
  #winScreen{background:rgba(5,5,15,0.96);display:none}
  .title{font-size:clamp(18px,5vw,44px);color:#c0b0e0;text-shadow:0 0 20px #6644aa,0 0 40px #4422aa;letter-spacing:4px;text-align:center}
  .subtitle{font-size:clamp(10px,2.5vw,16px);color:#8877aa;margin-top:8px;text-align:center;padding:0 20px}
  .btn{padding:12px 32px;font-size:clamp(13px,3vw,20px);background:rgba(60,40,80,0.5);color:#c0b0d0;border:1px solid #6644aa;border-radius:4px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:2px;margin-top:20px;transition:all .2s}
  .btn:hover{background:rgba(80,50,120,0.6);box-shadow:0 0 15px rgba(100,68,170,0.4)}
  .levelNum{font-size:clamp(28px,7vw,56px);color:#c0b0e0;text-shadow:0 0 25px #6644aa}
  .levelName{font-size:clamp(12px,3vw,20px);color:#8877aa;margin-top:6px}
  .info{color:#554477;font-size:clamp(9px,2vw,13px);margin-top:18px;text-align:center;line-height:1.8;padding:0 20px}
  #hud{position:absolute;top:6px;left:8px;right:8px;display:flex;justify-content:space-between;z-index:4;pointer-events:none}
  .hudItem{color:#9988bb;font-size:clamp(9px,1.8vw,13px);background:rgba(10,10,20,0.7);padding:2px 8px;border-radius:2px;font-family:'Courier New',monospace}
  #deathFlash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(180,20,20,0.35);z-index:3;pointer-events:none;opacity:0;transition:opacity 0.1s}
  #secretFlash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(200,180,50,0.25);z-index:3;pointer-events:none;opacity:0;transition:opacity 0.3s}
  .secretFound{font-size:clamp(10px,2.5vw,16px);color:#ddbb44;text-shadow:0 0 10px #aa8822;margin-top:6px;text-align:center}

  #mobileControls{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none;display:none}
  .mobileBtn{position:fixed;border-radius:50%;background:rgba(100,80,140,0.25);border:2px solid rgba(140,120,180,0.4);pointer-events:auto;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .1s,border-color .1s;color:rgba(180,150,220,0.7);font-family:'Courier New',monospace;box-shadow:0 0 10px rgba(100,68,170,0.15)}

  #mobileControls.portrait #btnLeft{width:72px;height:72px;bottom:24px;left:16px;font-size:26px}
  #mobileControls.portrait #btnRight{width:72px;height:72px;bottom:24px;left:100px;font-size:26px}
  #mobileControls.portrait #btnJump{width:88px;height:88px;bottom:24px;right:16px;font-size:13px;letter-spacing:1px;font-weight:bold}

  #mobileControls.landscape #btnLeft{width:60px;height:60px;bottom:16px;left:12px;font-size:22px}
  #mobileControls.landscape #btnRight{width:60px;height:60px;bottom:16px;left:82px;font-size:22px}
  #mobileControls.landscape #btnJump{width:74px;height:74px;bottom:16px;right:12px;font-size:12px;letter-spacing:1px;font-weight:bold}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="deathFlash"></div>
  <div id="secretFlash"></div>
  <div id="hud" style="display:none">
    <span class="hudItem" id="hudLevel">LV 1</span>

    <span class="hudItem" id="hudSecret" style="color:#ddbb44;display:none">?</span>
  </div>
  <div id="startScreen" class="overlay">
    <div class="title">ONE PIXEL OBBY</div>
    <div class="subtitle">A single screen. A single pixel. One way out.</div>
    <button class="btn" onclick="startGame()">START</button>
    <div class="info">
      Arrow Keys / WASD to move &amp; jump<br>
      Hold jump to auto-jump on ground &amp; walls<br>
      Reach the portal. Avoid red spikes.<br>
      Look for secret passages...<br>
      Each level = one screen.
    </div>
  </div>
  <div id="levelScreen" class="overlay">
    <div class="levelNum" id="levelNum">1</div>
    <div class="levelName" id="levelName"></div>
    <div class="secretFound" id="secretFound" style="display:none"></div>
  </div>
  <div id="winScreen" class="overlay">
    <div class="title" style="color:#80c080;text-shadow:0 0 20px #44aa44">ESCAPED</div>
    <div class="subtitle" style="color:#66aa66">You made it through every screen.</div>
    <div class="info" id="winStats"></div>
    <button class="btn" style="border-color:#44aa44;color:#80c080" onclick="location.reload()">AGAIN</button>
  </div>
  <div id="mobileControls" class="portrait">
    <div class="mobileBtn" id="btnLeft">&lt;</div>
    <div class="mobileBtn" id="btnRight">&gt;</div>
    <div class="mobileBtn" id="btnJump">JUMP</div>
  </div>
</div>

  const L=LEVELS[idx];
  plats=[];
  for(const p of L.plats) plats.push({x:p[0],y:p[1],w:p[2],h:p[3]});
  if(L.walls) for(const w of L.walls) plats.push({x:w[0],y:w[1],w:w[2],h:w[3]});
  spikes=L.spikes.map(s=>({x:s[0],y:s[1],w:s[2],h:s[3],dir:s[4]}));
  mplats=(L.moving||[]).filter(m=>m.length).map(m=>({
    x:m[0],y:m[1],w:m[2],h:m[3],
    sx:m[0],sy:m[1],axis:m[4],range:m[5],speed:m[6],
    phase:Math.random()*Math.PI*2,px:m[0],py:m[1]
  }));
  dplats=(L.disappear||[]).map(d=>({
    x:d[0],y:d[1],w:d[2],h:d[3],stay:d[4],gone:d[5],
    timer:0,visible:true,touched:false,alpha:1,goneT:0
  }));
  secrets=(L.secrets||[]).map(s=>({x:s[0],y:s[1],w:s[2],h:s[3],found:false}));
  portalPos={x:L.portal[0],y:L.portal[1]};
  P.x=L.start[0];P.y=L.start[1]-P.h;
  P.vx=0;P.vy=0;P.onGround=false;P.onWall=0;
  P.dead=false;P.facing=1;P.coyote=0;P.jbuf=0;P.justJumped=false;P.trail=[];P.squash=1;P.wasOnGround=false;
  particles=[];autoCD=0;
  // Ambient
  fogParts=[];
  for(let i=0;i<8;i++) fogParts.push({x:Math.random()*GW,y:Math.random()*GH,s:8+Math.random()*16,sp:0.1+Math.random()*0.2,a:0.02+Math.random()*0.03});
  ambientBats=[];
  for(let i=0;i<3;i++) ambientBats.push({x:Math.random()*GW,y:10+Math.random()*30,sx:20+Math.random()*120,sp:0.2+Math.random()*0.3,r:15+Math.random()*20,wf:Math.random()*Math.PI*2});
}

// ======================== INPUT ========================
document.addEventListener('keydown',e=>{
  keys[e.key]=true;keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Space'].includes(e.key))e.preventDefault();
  if((e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.code==='Space'||e.key===' ')&&gameState==='playing') P.jbuf=JUMP_BUF;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

function setupTouch(id,onDown,onUp){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();el.classList.add('pressed');onDown();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('pressed');onUp();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();el.classList.remove('pressed');onUp();},{passive:false});
}
setupTouch('btnLeft',()=>touchL=true,()=>touchL=false);
setupTouch('btnRight',()=>touchR=true,()=>touchR=false);
setupTouch('btnJump',()=>{touchJ=true;P.jbuf=JUMP_BUF;},()=>touchJ=false);

// ======================== COLLISION ========================
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function getAllPlats(){
  let all=[...plats];
  for(const m of mplats) all.push({x:m.x,y:m.y,w:m.w,h:m.h,isM:true,mref:m});
  for(const d of dplats) if(d.visible) all.push({x:d.x,y:d.y,w:d.w,h:d.h,isD:true,dref:d});
  return all;
}

function resolvePlayer(allP){
  P.onGround=false;P.onWall=0;
  for(const p of allP){
    if(!hit(P,p))continue;
    const ox=Math.min(P.x+P.w-p.x,p.x+p.w-P.x);
    const oy=Math.min(P.y+P.h-p.y,p.y+p.h-P.y);
    if(oy<ox){
      if(P.y+P.h/2<p.y+p.h/2){
        P.y=p.y-P.h;P.vy=0;P.onGround=true;P.coyote=COYOTE;
        if(p.isM&&p.mref){P.x+=p.mref.x-p.mref.px;}
        if(p.isD&&p.dref&&!p.dref.touched)p.dref.touched=true;
      } else {P.y=p.y+p.h;P.vy=Math.max(P.vy,0);}
    } else {
      if(P.x+P.w/2<p.x+p.w/2){P.x=p.x-P.w;if(!P.onGround)P.onWall=-1;}
      else{P.x=p.x+p.w;if(!P.onGround)P.onWall=1;}
      P.vx=0;
    }
  }
}

// ======================== UPDATE ========================
function update(){
  if(gameState!=='playing')return;
  frame++;

  let mx=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']||touchL)mx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']||touchR)mx+=1;
  const wantJump=keys['ArrowUp']||keys['w']||keys['W']||keys[' ']||keys['Space']||touchJ;

  // Horizontal
  const ctrl=P.onGround?1:AIR_CONTROL;
  P.vx+=mx*MOVE_SPEED*0.3*ctrl;
  P.vx*=FRICTION;
  if(Math.abs(P.vx)<0.05)P.vx=0;
  if(mx!==0)P.facing=mx;

  // Coyote & buffer
  if(P.onGround)P.coyote=COYOTE; else P.coyote=Math.max(0,P.coyote-1);
  if(P.jbuf>0)P.jbuf--;
  if(autoCD>0)autoCD--;

  // AUTO-JUMP
  if(wantJump&&autoCD<=0){
    if(P.onGround&&!P.justJumped){P.jbuf=JUMP_BUF;}
    else if(P.onWall!==0&&!P.onGround&&!P.justJumped){P.jbuf=JUMP_BUF;}
  }

  if(P.onGround||P.onWall!==0)P.justJumped=false;
  if(!P.onGround&&P.onWall===0&&P.justJumped)P.justJumped=false;

  // Wall slide
  if(P.onWall!==0&&!P.onGround&&P.vy>0){
    P.vy=Math.min(P.vy,WALL_SLIDE_SPEED);
  }
  // Proactive wall detection
  if(!P.onGround&&P.onWall===0&&mx!==0){
    const ap=getAllPlats();
    for(const p of ap){
      if(!hit({x:P.x-1,y:P.y,w:P.w+2,h:P.h},p))continue;
      const ox=Math.min(P.x+P.w-p.x,p.x+p.w-P.x);
      const oy=Math.min(P.y+P.h-p.y,p.y+p.h-P.y);
      if(ox<oy)continue;
      if(P.x+P.w/2<p.x+p.w/2&&mx<0)P.onWall=-1;
      else if(P.x+P.w/2>p.x+p.w/2&&mx>0)P.onWall=1;
    }
  }

  // Squash & stretch - landing
  P.wasOnGround=P.onGround;

  // Jump
  if(P.jbuf>0){
    if(P.coyote>0){
      P.vy=JUMP_FORCE;P.onGround=false;P.coyote=0;P.jbuf=0;
      P.justJumped=true;autoCD=AUTO_CD;
      P.squash=0.6; // Stretch on jump
      spawnP(P.x+P.w/2,P.y+P.h,4,'#6666aa');
    } else if(P.onWall!==0){
      const wd=P.onWall;
      P.vy=WALL_JUMP_FORCE;P.vx=-wd*WALL_JUMP_PUSH;
      P.onWall=0;P.jbuf=0;P.justJumped=true;autoCD=AUTO_CD;
      P.squash=0.6;
      spawnP(P.x+(wd>0?P.w:0),P.y+P.h/2,5,'#7777cc');
    }
  }

  // Variable jump
  if(!wantJump&&P.vy<-1.2)P.vy*=0.82;

  // Gravity
  P.vy+=GRAVITY;
  if(P.vy>5)P.vy=5;

  // Move with sub-steps
  const stepVx=P.vx/SUB_STEPS;
  const stepVy=P.vy/SUB_STEPS;
  const allP=getAllPlats();
  for(let s=0;s<SUB_STEPS;s++){
    P.x+=stepVx;
    P.y+=stepVy;
    resolvePlayer(allP);
  }

  // Landing squash effect
  if(P.onGround&&!P.wasOnGround){
    P.squash=1.4; // Squash on land
    spawnP(P.x+P.w/2,P.y+P.h,3,'#4444aa');
  }

  // Animate squash back to normal
  P.squash+=(1-P.squash)*0.2;

  // Clamp
  P.x=Math.max(0,Math.min(GW-P.w,P.x));

  // Fall death
  if(P.y>GH+10)killPlayer();

  // Spike check
  for(const s of spikes){
    if(hit(P,s))killPlayer();
  }

  // Portal check
  if(hit(P,{x:portalPos.x,y:portalPos.y,w:5,h:5}))nextLevel();

  // Secret check
  for(const s of secrets){
    if(!s.found&&hit(P,s)){
      s.found=true;
      secretsFound++;
      const sf=document.getElementById('secretFlash');
      sf.style.opacity='1';setTimeout(()=>{sf.style.opacity='0';},400);
      spawnP(s.x+s.w/2,s.y+s.h/2,12,'#ddbb44');
      document.getElementById('hudSecret').style.display='inline';
      document.getElementById('hudSecret').textContent=`? ${secretsFound}/${totalSecrets}`;
    }
  }

  // Moving platforms
  for(const m of mplats){
    m.px=m.x;m.py=m.y;
    if(m.axis==='x')m.x=m.sx+Math.sin(frame*0.02*m.speed+m.phase)*m.range;
    else m.y=m.sy+Math.sin(frame*0.02*m.speed+m.phase)*m.range;
  }

  // Disappear platforms
  for(const d of dplats){
    if(d.touched&&d.visible){
      d.timer++;
      if(d.timer>d.stay){d.visible=false;d.alpha=0;d.goneT=0;}
      else d.alpha=0.5+Math.sin(d.timer*0.5)*0.3;
    }
    if(!d.visible){d.goneT++;if(d.goneT>d.gone){d.visible=true;d.touched=false;d.timer=0;d.alpha=1;d.goneT=0;}}
  }

  // Trail
  if(frame%3===0){P.trail.push({x:P.x+P.w/2,y:P.y+P.h/2,a:0.4});if(P.trail.length>8)P.trail.shift();}
  for(const t of P.trail)t.a*=0.84;

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.02;p.life--;if(p.life<=0)particles.splice(i,1);}

  // Fog
  for(const f of fogParts){f.x+=f.sp;if(f.x>GW+f.s)f.x=-f.s;}

  // Bats
  for(const b of ambientBats){b.x=b.sx+Math.sin(frame*0.01*b.sp+b.wf)*b.r;b.wf+=0.15;}

  if(shakeT>0)shakeT--;

  // HUD
  document.getElementById('hudLevel').textContent=`LV ${curLv+1}/${TOTAL_LEVELS}`;
  document.getElementById('hudDeaths').textContent=`X ${deaths}`;
}

function spawnP(x,y,n,c){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,maxLife:20,color:c,size:1});}

function killPlayer(){
  if(P.dead)return;
  P.dead=true;shakeT=10;deaths++;totalDeaths++;
  const flash=document.getElementById('deathFlash');
  flash.style.opacity='1';setTimeout(()=>{flash.style.opacity='0';},200);
  spawnP(P.x+P.w/2,P.y+P.h/2,12,'#cc3333');
  setTimeout(()=>{
    const L=LEVELS[curLv];
    P.x=L.start[0];P.y=L.start[1]-P.h;
    P.vx=0;P.vy=0;P.dead=false;P.onGround=false;P.onWall=0;
    P.coyote=0;P.jbuf=0;P.justJumped=false;P.trail=[];P.squash=1;autoCD=0;
    dplats=(L.disappear||[]).map(d=>({
      x:d[0],y:d[1],w:d[2],h:d[3],stay:d[4],gone:d[5],
      timer:0,visible:true,touched:false,alpha:1,goneT:0
    }));
  },300);
}

function nextLevel(){
  curLv++;
  if(curLv>=TOTAL_LEVELS){
    gameState='win';
    document.getElementById('winScreen').style.display='flex';
    document.getElementById('hud').style.display='none';
    if(isMobile)document.getElementById('mobileControls').style.display='none';
    document.getElementById('winStats').textContent=`Deaths: ${totalDeaths} | Secrets: ${secretsFound}/${totalSecrets}`;
    return;
  }
  showLevelIntro();
}

function showLevelIntro(){
  gameState='levelIntro';
  loadLevel(curLv);
  document.getElementById('levelNum').textContent=curLv+1;
  document.getElementById('levelName').textContent=LEVELS[curLv].name;
  document.getElementById('secretFound').style.display='none';
  document.getElementById('levelScreen').style.display='flex';
  document.getElementById('hud').style.display='none';
  if(isMobile)document.getElementById('mobileControls').style.display='none';
  setTimeout(()=>{
    document.getElementById('levelScreen').style.display='none';
    document.getElementById('hud').style.display='flex';
    if(isMobile)document.getElementById('mobileControls').style.display='block';
    if(secretsFound>0){document.getElementById('hudSecret').style.display='inline';document.getElementById('hudSecret').textContent=`? ${secretsFound}/${totalSecrets}`;}
    gameState='playing';
  },1500);
}

// ======================== DRAW ========================
function draw(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const sx=canvas.width/GW, sy=canvas.height/GH;
  scale=Math.min(sx,sy);
  const offX=Math.floor((canvas.width-GW*scale)/2);
  const offY=Math.floor((canvas.height-GH*scale)/2);

  ctx.fillStyle='#06060e';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offX,offY);
  ctx.scale(scale,scale);

  if(shakeT>0){
    ctx.translate((Math.random()-0.5)*2*(shakeT/10),(Math.random()-0.5)*2*(shakeT/10));
  }

  // Sky
  const bg=ctx.createLinearGradient(0,0,0,GH);
  if(curLv>=15){
    bg.addColorStop(0,'#12040a');bg.addColorStop(0.5,'#1a0810');bg.addColorStop(1,'#0a0a12');
  } else if(curLv>=7){
    bg.addColorStop(0,'#0a0418');bg.addColorStop(0.5,'#0c0820');bg.addColorStop(1,'#0a0a1a');
  } else {
    bg.addColorStop(0,'#04041a');bg.addColorStop(0.5,'#08082a');bg.addColorStop(1,'#0a0a1a');
  }
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);

  // Stars
  for(let i=0;i<60;i++){
    const stx=(i*73+11)%GW, sty=(i*47+7)%(GH*0.5);
    const tw=0.1+Math.sin(frame*0.02+i*0.7)*0.12;
    ctx.fillStyle=`rgba(180,180,255,${tw})`;
    ctx.fillRect(stx,sty,1,1);
  }

  // Moon
  const moonX=130,moonY=14;
  ctx.fillStyle='rgba(180,180,220,0.04)';
  ctx.beginPath();ctx.arc(moonX,moonY,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8c8e0';
  ctx.beginPath();ctx.arc(moonX,moonY,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0a0c0';
  ctx.beginPath();ctx.arc(moonX-2,moonY-1,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(moonX+2,moonY+2,1,0,Math.PI*2);ctx.fill();
  if(curLv>=7){
    ctx.beginPath();ctx.arc(moonX,moonY,7,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,40,40,${0.1+Math.sin(frame*0.015)*0.05})`;ctx.fill();
  }

  // Fog
  for(const f of fogParts){
    ctx.fillStyle=`rgba(60,60,100,${f.a})`;
    ctx.beginPath();ctx.arc(f.x,f.y,f.s,0,Math.PI*2);ctx.fill();
  }

  // Bats
  for(const b of ambientBats){
    const wu=Math.sin(b.wf)*4;
    ctx.fillStyle='#1a1a2a';
    ctx.fillRect(Math.floor(b.x),Math.floor(b.y),2,2);
    ctx.fillRect(Math.floor(b.x)-2,Math.floor(b.y)+wu,2,1);
    ctx.fillRect(Math.floor(b.x)+2,Math.floor(b.y)+wu,2,1);
    ctx.fillStyle='#ff2222';
    ctx.fillRect(Math.floor(b.x),Math.floor(b.y),1,1);
  }

  // Platforms
  for(const p of plats){
    ctx.fillStyle='#10102a';ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle='#2a2a4a';ctx.fillRect(p.x,p.y,p.w,1);
    // Subtle texture
    if(p.w>8){
      ctx.fillStyle='#161638';
      for(let x=p.x+4;x<p.x+p.w-2;x+=6) ctx.fillRect(x,p.y+2,1,p.h-3);
    }
  }

  // Moving platforms
  for(const m of mplats){
    ctx.fillStyle='#14203a';ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.fillStyle='#4488bb';ctx.fillRect(m.x,m.y,m.w,1);
    // Glow
    ctx.fillStyle='rgba(68,136,187,0.06)';ctx.fillRect(m.x-1,m.y-1,m.w+2,m.h+2);
  }

  // Disappear platforms
  for(const d of dplats){
    if(d.alpha>0.01){
      ctx.globalAlpha=d.alpha;
      ctx.fillStyle='#221430';ctx.fillRect(d.x,d.y,d.w,d.h);
      ctx.fillStyle='#9955aa';ctx.fillRect(d.x,d.y,d.w,1);
      // Flicker when about to vanish
      if(d.touched&&d.timer>d.stay*0.7){
        ctx.fillStyle=`rgba(200,100,200,${0.2+Math.sin(frame*0.5)*0.15})`;
        ctx.fillRect(d.x,d.y,d.w,d.h);
      }
      ctx.globalAlpha=1;
    }
  }

  // Spikes
  for(const s of spikes){
    ctx.fillStyle='#882020';
    if(s.dir==='up'){
      for(let x=s.x;x<s.x+s.w;x+=3){
        ctx.beginPath();ctx.moveTo(x,s.y+s.h);ctx.lineTo(x+1.5,s.y);ctx.lineTo(x+3,s.y+s.h);ctx.fill();
      }
      // Glow tips
      ctx.fillStyle=`rgba(255,50,50,${0.4+Math.sin(frame*0.08)*0.2})`;
      for(let x=s.x;x<s.x+s.w;x+=4)ctx.fillRect(x+1,s.y,1,1);
    } else if(s.dir==='down'){
      for(let x=s.x;x<s.x+s.w;x+=3){
        ctx.beginPath();ctx.moveTo(x,s.y);ctx.lineTo(x+1.5,s.y+s.h);ctx.lineTo(x+3,s.y);ctx.fill();
      }
      ctx.fillStyle=`rgba(255,50,50,${0.4+Math.sin(frame*0.08)*0.2})`;
      for(let x=s.x;x<s.x+s.w;x+=4)ctx.fillRect(x+1,s.y+s.h-1,1,1);
    }
    // Danger glow
    ctx.fillStyle=`rgba(255,30,30,${0.02+Math.sin(frame*0.06)*0.015})`;
    ctx.fillRect(s.x-1,s.y-1,s.w+2,s.h+2);
  }

  // Secret zones (subtle shimmer if not found)
  for(const s of secrets){
    if(!s.found){
      const shimmer=0.03+Math.sin(frame*0.05+s.x)*0.02;
      ctx.fillStyle=`rgba(220,180,50,${shimmer})`;
      ctx.fillRect(s.x,s.y,s.w,s.h);
    } else {
      // Show as opened
      ctx.fillStyle='rgba(220,180,50,0.08)';
      ctx.fillRect(s.x,s.y,s.w,s.h);
    }
  }

  // Portal
  const pulse=Math.sin(frame*0.1)*0.3;
  // Outer glow
  ctx.fillStyle=`rgba(80,255,120,${0.06+pulse*0.04})`;
  ctx.fillRect(portalPos.x-3,portalPos.y-3,11,11);
  // Mid glow
  ctx.fillStyle=`rgba(80,255,120,${0.15+pulse*0.08})`;
  ctx.fillRect(portalPos.x-2,portalPos.y-2,9,9);
  // Core
  ctx.fillStyle=`rgba(80,255,120,${0.4+pulse*0.15})`;
  ctx.fillRect(portalPos.x-1,portalPos.y-1,7,7);
  ctx.fillStyle=`rgba(80,255,120,${0.6+pulse*0.2})`;
  ctx.fillRect(portalPos.x,portalPos.y,5,5);
  ctx.fillStyle=`rgba(160,255,200,${0.75+pulse*0.2})`;
  ctx.fillRect(portalPos.x+1,portalPos.y+1,3,3);
  // Spinning dots
  for(let i=0;i<4;i++){
    const a=frame*0.07+i*Math.PI/2;
    const rx=portalPos.x+2.5+Math.cos(a)*4;
    const ry=portalPos.y+2.5+Math.sin(a)*4;
    ctx.fillStyle=`rgba(120,255,150,${0.3+pulse*0.15})`;
    ctx.fillRect(Math.floor(rx),Math.floor(ry),1,1);
  }

  // Player trail
  for(const t of P.trail){
    ctx.fillStyle=`rgba(120,100,180,${t.a*0.25})`;
    ctx.fillRect(Math.floor(t.x),Math.floor(t.y),1,1);
  }

  // Player with squash & stretch
  if(!P.dead){
    const sq=P.squash;
    const dw=P.w*(2-sq);  // When squashed vertically, stretch horizontally
    const dh=P.h*sq;
    const dx=P.x-(dw-P.w)/2;
    const dy=P.y+(P.h-dh);

    // Glow
    ctx.fillStyle='rgba(140,100,220,0.1)';
    ctx.fillRect(dx-1,dy-1,dw+2,dh+2);
    // Body
    ctx.fillStyle='#8866cc';
    ctx.fillRect(Math.floor(dx),Math.floor(dy),Math.ceil(dw),Math.ceil(dh));
    // Bright center
    ctx.fillStyle='#bb99ff';
    ctx.fillRect(Math.floor(dx+dw/2-0.5),Math.floor(dy+dh/2-0.5),1,1);
    // Eyes
    ctx.fillStyle='#ffffff';
    ctx.fillRect(Math.floor(dx+(P.facing>0?dw-2:0)),Math.floor(dy),1,1);
    ctx.fillRect(Math.floor(dx+(P.facing>0?dw-2:0)),Math.floor(dy+dh-1),1,1);

    // Wall slide sparks
    if(P.onWall!==0&&!P.onGround&&P.vy>0.1&&frame%4===0){
      spawnP(P.x+(P.onWall>0?P.w:0),P.y+P.h/2,1,'#5555aa');
    }
  }

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);
  }
  ctx.globalAlpha=1;

  ctx.restore();

  // Border with pulse
  const borderA=0.08+Math.sin(frame*0.03)*0.04;
  ctx.strokeStyle=`rgba(100,68,170,${borderA})`;
  ctx.lineWidth=1;
  ctx.strokeRect(offX-1,offY-1,GW*scale+2,GH*scale+2);

  // Vignette
  const vig=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.35,canvas.width/2,canvas.height/2,canvas.height*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ======================== GAME LOOP ========================
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
function startGame(){
  document.getElementById('startScreen').style.display='none';
  curLv=0;deaths=0;totalDeaths=0;frame=0;secretsFound=0;
  showLevelIntro();
}
gameLoop();
</script>
