<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Pixel Block Obby</title><style>*{margin:0;padding:0}body{background:#111;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif}canvas{border:4px solid #222}.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.9);z-index:100;color:#fff;padding:20px}.screen.active{display:flex}h1{font-size:48px;margin:20px}h2{font-size:36px;margin:20px}button{font-size:24px;padding:12px 30px;border:none;border-radius:8px;cursor:pointer;color:#fff;background:#4CAF50;margin:8px;border-bottom:4px solid rgba(0,0,0,.3)}button:active{transform:translateY(2px)}.btn-red{background:#f44336}.btn-blue{background:#2196F3}.btn-grey{background:#607D8B}.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:90%;max-width:400px}.level-btn{font-size:20px;padding:20px;background:#4CAF50;color:#fff;border:none;border-radius:8px;cursor:pointer}.level-btn:active{transform:translateY(2px)}#hud{position:absolute;top:20px;left:20px;right:20px;display:none;justify-content:space-between;z-index:50;font-weight:bold;color:#fff}.mobile-controls{position:absolute;bottom:20px;left:20px;right:20px;display:none;gap:15px;justify-content:center}.mobile-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.3);border:3px solid #fff;color:#fff;font-size:24px;cursor:pointer}</style></head><body><canvas id="game"></canvas><div id="menu" class="screen active"><h1>PIXEL BLOCK OBBY</h1><button onclick="startGame(1)">PLAY</button><button class="btn-blue" onclick="showLevel()">LEVELS</button><button class="btn-grey" onclick="showSettings()">SETTINGS</button></div><div id="level" class="screen"><h2>SELECT LEVEL</h2><div class="level-grid" id="grid"></div><button class="btn-grey" onclick="goMenu()">BACK</button></div><div id="settings" class="screen"><h2>SETTINGS</h2><button class="btn-red" onclick="resetProgress()">RESET</button><button class="btn-grey" onclick="goMenu()">BACK</button></div><div id="hud"><div id="level-text">LEVEL 1</div><div id="death-text">DEATHS: 0</div><button onclick="pauseGame()" class="btn-grey">PAUSE</button></div><div class="mobile-controls" id="mobile"><button class="mobile-btn" onclick="keys.left=1">◀</button><button class="mobile-btn" onclick="keys.right=1">▶</button><button class="mobile-btn" onclick="keys.jump=1">↑</button></div><script>const c=document.getElementById('game'),x=c.getContext('2d');c.width=800;c.height=608;const B=32;let state='MENU',level=1,deaths=0,keys={left:0,right:0,jump:0},p={x:100,y:400,vx:0,vy:0,w:24,h:28,grounded:0};const L=["GGGGG..GGG......G..GGGGGG","GGGG.............G.GGGGGG","GGGG...............GGGGGG","GGGGTSG......TSG.....TSG.","GGGGLL..LLGGLL..TS.GGGGGG","GGGGGVVVVGTS...FGGGGGLLLG","GGGGGGGGGG.GGTSFG..GGGGGG","GGGLLLLLLLLLLLLLLLLLLLLLL","GGGFFFFFFFFFFTSTS.G.LL.GG","GGGGGVVGGGLLLGGGGGGGGGGGG","LLGGGGLLLLLLLLLLLLLLLLLLL","GGGVVVGFTSGG...H...GFFFMN","LLLLLGLLLLLLLLLLLLLLNLLLD","GGGVVVGGFFGGLLLGGLNLLLLLL","GFFFFFFFFFFFFFFFFTSGGLL.N","EEEEEE....................","EEE......................","EEE......................","EEE......................","EEE......................"];function showLevel(){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));document.getElementById('level').classList.add('active');const g=document.getElementById('grid');g.innerHTML='';for(let i=1;i<=20;i++){const btn=document.createElement('button');btn.className='level-btn';btn.textContent=i;if(i>=11&&i<=15)btn.style.background='#2E7D32';if(i>=16)btn.style.background='#1565C0';btn.onclick=()=>startGame(i);g.appendChild(btn)}}function showSettings(){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));document.getElementById('settings').classList.add('active')}function goMenu(){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));document.getElementById('menu').classList.add('active');document.getElementById('hud').style.display='none'}function resetProgress(){deaths=0;alert('Progress Reset')}function startGame(l){level=l;state='PLAYING';document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));document.getElementById('hud').style.display='flex';document.getElementById('level-text').textContent='LEVEL '+l;p.x=100;p.y=400;p.vx=0;p.vy=0;p.grounded=0}function pauseGame(){state='MENU';goMenu()}document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keys.left=1;if(e.key==='ArrowRight')keys.right=1;if(e.key===' '||e.key==='ArrowUp')keys.jump=1});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=0;if(e.key==='ArrowRight')keys.right=0;if(e.key===' '||e.key==='ArrowUp')keys.jump=0});function gameLoop(){x.fillStyle='#1a1a1a';x.fillRect(0,0,800,608);if(state!=='PLAYING')return;p.vy+=0.7;if(keys.left)p.vx=-5;if(keys.right)p.vx=5;if(keys.jump&&p.grounded){p.vy=-12;p.grounded=0}p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;if(p.y>608){deaths++;startGame(level)}if(p.y+p.h>=576){p.y=576-p.h;p.vy=0;p.grounded=1}else{p.grounded=0}x.fillStyle='#ff0000';x.fillRect(p.x,p.y,p.w,p.h);document.getElementById('death-text').textContent='DEATHS: '+deaths}requestAnimationFrame(gameLoop);window.addEventListener('resize',()=>{const scale=Math.min(window.innerWidth/800,window.innerHeight/608);c.style.width=800*scale+'px';c.style.height=608*scale+'px'});</script></body></html>
